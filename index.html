<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkubator IoT - Dean & Faaiz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; border: 1px solid #333; }
        h2 { margin-bottom: 5px; color: #00e676; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .data-container { margin: 20px 0; display: grid; gap: 15px; }
        .data-item { background: #2a2a2a; padding: 15px; border-radius: 12px; border-bottom: 3px solid #00e676; }
        .label { font-size: 12px; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .value { font-size: 26px; font-weight: bold; }
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-on { background: #00c853; }
        .btn-on:active { background: #008135; }
        .btn-off { background: #d50000; }
        .btn-off:active { background: #9b0000; }
        #conn-text { font-size: 12px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Inkubator IoT</h2>
    <p style="color: #888; font-size: 14px; margin-top: 0;">Polban - Dean & Faaiz</p>
    
    <div class="data-container">
        <div class="data-item">
            <span class="label">Temperatur</span>
            <span class="value"><span id="temp">--</span>°C</span>
        </div>
        <div class="data-item" style="border-color: #29b6f6;">
            <span class="label">Kelembapan</span>
            <span class="value"><span id="hum">--</span>%</span>
        </div>
        <div class="data-item" style="border-color: #ffca28;">
            <span class="label">Cahaya (LDR)</span>
            <span class="value" id="ldr">--</span>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-on" onclick="send('1')">PUTAR</button>
        <button class="btn-off" onclick="send('0')">STOP</button>
    </div>

    <div id="conn-text">
        <span id="dot" class="status-dot" style="background-color: #ff5252;"></span>
        <span id="status-msg">Menghubungkan...</span>
    </div>
</div>

<script>
    // Konfigurasi MQTT menggunakan Secure WebSocket (WSS)
    // Broker HiveMQ Port 8884 adalah port standar untuk WSS
    var broker = "broker.hivemq.com";
    var port = 8884;
    var clientID = "dean_polban_" + Math.random().toString(16).substr(2, 8);
    
    var client = new Paho.MQTT.Client("wss://" + broker + ":" + port + "/mqtt", clientID);

    client.onConnectionLost = function(responseObject) {
        document.getElementById("dot").style.backgroundColor = "#ff5252";
        document.getElementById("status-msg").innerHTML = "Terputus dari Server";
        console.log("Lost: " + responseObject.errorMessage);
        // Coba konek ulang otomatis setelah 5 detik
        setTimeout(connectMQTT, 5000);
    };

    client.onMessageArrived = function(message) {
        try {
            var data = JSON.parse(message.payloadString);
            document.getElementById("temp").innerHTML = data.temp;
            document.getElementById("hum").innerHTML = data.hum;
            document.getElementById("ldr").innerHTML = data.ldr;
        } catch(e) {
            console.log("Error parsing JSON: " + e);
        }
    };

    function connectMQTT() {
        client.connect({
            onSuccess: function() {
                document.getElementById("dot").style.backgroundColor = "#00e676";
                document.getElementById("status-msg").innerHTML = "Online (Connected)";
                client.subscribe("polban/dean/data");
            },
            onFailure: function(e) {
                document.getElementById("status-msg").innerHTML = "Gagal Konek, mencoba lagi...";
                setTimeout(connectMQTT, 5000);
            },
            useSSL: true
        });
    }

    function send(val) {
        if(client.isConnected()) {
            var msg = new Paho.MQTT.Message(val);
            msg.destinationName = "polban/dean/motor";
            client.send(msg);
        } else {
            alert("Belum terhubung ke server!");
        }
    }

    // Jalankan koneksi saat pertama kali load
    connectMQTT();
</script>

</body>
</html>
